name: CI

on:
  pull_request:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  commitlint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate commit messages
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            COMMITS=$(git log --no-merges --format=%s origin/${{ github.base_ref }}..HEAD)
          else
            COMMITS=$(git log -1 --format=%s)
          fi

          PATTERN='^(feat|fix|docs|style|refactor|perf|test|chore|ci|build|revert)(\([a-zA-Z0-9_-]+\))?: .+'

          echo "Validating commit messages..."
          FAILED=0
          while IFS= read -r MSG; do
            if [ -n "$MSG" ]; then
              if echo "$MSG" | grep -qE "$PATTERN"; then
                echo "OK $MSG"
              else
                echo "Invalid commit message: $MSG"
                echo "Expected format: type(scope): description"
                FAILED=1
              fi
            fi
          done <<< "$COMMITS"

          if [ $FAILED -eq 1 ]; then
            exit 1
          fi

  frontend:
    runs-on: ubuntu-latest
    needs: commitlint

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Build web assets
        run: npm run build:web

  rust:
    runs-on: ubuntu-latest
    needs: commitlint

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Linux dependencies for Tauri
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            file \
            libayatana-appindicator3-dev \
            libgtk-3-dev \
            librsvg2-dev \
            libwebkit2gtk-4.1-dev \
            patchelf \
            ripgrep \
            wget

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Cache Rust dependencies
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Check formatting
        run: cargo fmt --check --manifest-path src-tauri/Cargo.toml

      - name: Run Rust tests
        run: cargo test --locked --manifest-path src-tauri/Cargo.toml
