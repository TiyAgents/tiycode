name: Build and Upload Release Assets

on:
  release:
    types: [prereleased, released]

permissions:
  contents: write

jobs:
  build:
    if: github.event.action == 'prereleased'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: macos
            arch: aarch64
            target: aarch64-apple-darwin
          - os: macos-14
            platform: macos
            arch: x86_64
            target: x86_64-apple-darwin
          - os: windows-latest
            platform: windows
            arch: x86_64
            target: x86_64-pc-windows-msvc
          - os: ubuntu-22.04
            platform: linux
            arch: x86_64
            target: x86_64-unknown-linux-gnu

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          cache-targets: true
          cache-all-crates: true
          key: ${{ matrix.target }}

      - name: Cache Homebrew downloads
        if: matrix.platform == 'macos'
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Caches/Homebrew
            /opt/homebrew/Cellar/ripgrep
          key: brew-ripgrep-${{ matrix.arch }}

      - name: Cache Chocolatey packages
        if: matrix.platform == 'windows'
        uses: actions/cache@v4
        with:
          path: C:\Users\runneradmin\AppData\Local\Temp\chocolatey
          key: choco-ripgrep

      - name: Install Linux dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libgtk-3-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev

      - name: Install ripgrep
        shell: bash
        run: |
          if [ "${{ matrix.platform }}" = "linux" ]; then
            sudo apt-get install -y ripgrep
          elif [ "${{ matrix.platform }}" = "macos" ]; then
            brew install ripgrep
          else
            choco install ripgrep -y
          fi

      - name: Install dependencies
        run: npm ci

      - name: Set version from tag
        shell: bash
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          # MSI requires pure numeric version (no pre-release suffix like -rc.1)
          # Strip pre-release suffix for bundle version on Windows
          BUNDLE_VERSION=$(echo "$VERSION" | sed 's/-.*//')
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "BUNDLE_VERSION=$BUNDLE_VERSION" >> "$GITHUB_ENV"

          # Use BUNDLE_VERSION for tauri.conf.json (bundler compatibility)
          # Use VERSION for display/tag reference
          node -e "
            const fs = require('fs');
            const conf = JSON.parse(fs.readFileSync('src-tauri/tauri.conf.json', 'utf8'));
            conf.version = '$BUNDLE_VERSION';
            fs.writeFileSync('src-tauri/tauri.conf.json', JSON.stringify(conf, null, 2) + '\n');
          "
          sed -i.bak "s/^version = \".*\"/version = \"$BUNDLE_VERSION\"/" src-tauri/Cargo.toml
          rm -f src-tauri/Cargo.toml.bak
          echo "Tag version: $VERSION, Bundle version: $BUNDLE_VERSION"

      - name: Fetch catalog snapshot for bundling
        shell: bash
        run: |
          mkdir -p src-tauri/bundled-catalog
          CATALOG_BASE="https://tiyagents.github.io/tiycore/catalog"
          curl -sSfL "$CATALOG_BASE/manifest.json" \
            -o src-tauri/bundled-catalog/catalog.manifest.json \
            --retry 3 --max-time 30
          curl -sSfL "$CATALOG_BASE/catalog.json" \
            -o src-tauri/bundled-catalog/catalog.json \
            --retry 3 --max-time 60
          echo "Catalog snapshot bundled:"
          ls -la src-tauri/bundled-catalog/
          cat src-tauri/bundled-catalog/catalog.manifest.json

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Updater signing key (required for createUpdaterArtifacts)
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # Only sign, do NOT notarize via tauri-action (we submit async below)
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          tauriScript: npx tauri
          args: --target ${{ matrix.target }}

      - name: Submit notarization (async)
        if: matrix.platform == 'macos'
        continue-on-error: true
        run: |
          BUNDLE_DIR="src-tauri/target/${{ matrix.target }}/release/bundle"
          for dmg in "$BUNDLE_DIR"/dmg/*.dmg; do
            [ -f "$dmg" ] || continue
            echo "Submitting $dmg for notarization..."
            xcrun notarytool submit "$dmg" \
              --apple-id "$APPLE_ID" \
              --password "$APPLE_APP_SPECIFIC_PASSWORD" \
              --team-id "$APPLE_TEAM_ID"
          done
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: Collect release artifacts
        shell: bash
        run: |
          mkdir -p release-artifacts
          BUNDLE_DIR="src-tauri/target/${{ matrix.target }}/release/bundle"

          if [ "${{ matrix.platform }}" = "macos" ]; then
            cp "$BUNDLE_DIR"/dmg/*.dmg release-artifacts/ 2>/dev/null || true
            # Updater artifacts: .app.tar.gz + .sig
            cp "$BUNDLE_DIR"/macos/*.app.tar.gz release-artifacts/ 2>/dev/null || true
            cp "$BUNDLE_DIR"/macos/*.app.tar.gz.sig release-artifacts/ 2>/dev/null || true
          elif [ "${{ matrix.platform }}" = "windows" ]; then
            cp "$BUNDLE_DIR"/msi/*.msi release-artifacts/ 2>/dev/null || true
            cp "$BUNDLE_DIR"/nsis/*.exe release-artifacts/ 2>/dev/null || true
            # Updater artifacts: .nsis.zip + .msi.zip + .sig
            cp "$BUNDLE_DIR"/nsis-updater/*.zip release-artifacts/ 2>/dev/null || true
            cp "$BUNDLE_DIR"/nsis-updater/*.sig release-artifacts/ 2>/dev/null || true
            cp "$BUNDLE_DIR"/msi-updater/*.zip release-artifacts/ 2>/dev/null || true
            cp "$BUNDLE_DIR"/msi-updater/*.sig release-artifacts/ 2>/dev/null || true
          elif [ "${{ matrix.platform }}" = "linux" ]; then
            cp "$BUNDLE_DIR"/deb/*.deb release-artifacts/ 2>/dev/null || true
            cp "$BUNDLE_DIR"/rpm/*.rpm release-artifacts/ 2>/dev/null || true
            cp "$BUNDLE_DIR"/appimage/*.AppImage release-artifacts/ 2>/dev/null || true
            # Updater artifacts: .AppImage.tar.gz + .sig
            cp "$BUNDLE_DIR"/appimage/*.AppImage.tar.gz release-artifacts/ 2>/dev/null || true
            cp "$BUNDLE_DIR"/appimage/*.AppImage.tar.gz.sig release-artifacts/ 2>/dev/null || true
          fi

          if [ "$BUNDLE_VERSION" != "$VERSION" ]; then
            for artifact in release-artifacts/*; do
              [ -f "$artifact" ] || continue
              renamed_artifact="${artifact//$BUNDLE_VERSION/$VERSION}"
              if [ "$renamed_artifact" != "$artifact" ]; then
                mv "$artifact" "$renamed_artifact"
              fi
            done
          fi

          echo "Collected artifacts:"
          ls -la release-artifacts/

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: release-artifacts/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Save artifacts for later use
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.platform }}-${{ matrix.arch }}
          path: release-artifacts/*
          retention-days: 30

  # Publish stable release: generate and upload update manifest when promoted from prerelease
  publish-stable:
    if: github.event.action == 'released'
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts from prereleased workflow run
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          echo "Looking for prereleased workflow run for tag: $TAG"

          RUN_ID=$(gh run list \
            --repo "${{ github.repository }}" \
            --workflow "release.yml" \
            --json databaseId,conclusion,headBranch \
            --jq ".[] | select(.headBranch == \"$TAG\" and .conclusion == \"success\") | .databaseId" \
            | head -n 1)

          if [ -z "$RUN_ID" ]; then
            echo "::warning::No successful prereleased workflow run found for tag $TAG. Skipping manifest upload."
            exit 0
          fi

          echo "Found workflow run: $RUN_ID"

          gh run download "$RUN_ID" \
            --repo "${{ github.repository }}" \
            --pattern "release-*" \
            --dir artifacts

          echo "Downloaded artifacts:"
          find artifacts -type f | sort

      - name: Generate updater manifest (latest.json)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          REPO="${{ github.repository }}"
          BASE_URL="https://github.com/${REPO}/releases/download/${TAG}"

          # Get release notes from GitHub
          NOTES=$(gh release view "$TAG" --repo "$REPO" --json body -q '.body' 2>/dev/null || echo "")
          PUB_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          # Read signatures from .sig files
          read_sig() {
            local pattern="$1"
            local sig_file
            sig_file=$(find artifacts -name "$pattern" -type f 2>/dev/null | head -n 1)
            if [ -n "$sig_file" ] && [ -f "$sig_file" ]; then
              cat "$sig_file"
            else
              echo ""
            fi
          }

          # Find actual artifact filenames (handle version renaming)
          find_artifact_name() {
            local pattern="$1"
            local name
            name=$(find artifacts -name "$pattern" -type f 2>/dev/null | head -n 1)
            if [ -n "$name" ]; then
              basename "$name"
            else
              echo ""
            fi
          }

          # macOS aarch64
          MACOS_ARM_SIG=$(read_sig "*aarch64*.app.tar.gz.sig")
          MACOS_ARM_NAME=$(find_artifact_name "*aarch64*.app.tar.gz" | grep -v '.sig$' | head -n 1)

          # macOS x86_64
          MACOS_X64_SIG=$(read_sig "*x64*.app.tar.gz.sig")
          MACOS_X64_NAME=$(find_artifact_name "*x64*.app.tar.gz" | grep -v '.sig$' | head -n 1)

          # Windows NSIS x86_64
          WIN_NSIS_SIG=$(read_sig "*x64-setup.exe.zip.sig")
          WIN_NSIS_NAME=$(find_artifact_name "*x64-setup.exe.zip" | grep -v '.sig$' | head -n 1)

          # Linux AppImage x86_64
          LINUX_SIG=$(read_sig "*amd64*.AppImage.tar.gz.sig")
          if [ -z "$LINUX_SIG" ]; then
            LINUX_SIG=$(read_sig "*x86_64*.AppImage.tar.gz.sig")
          fi
          LINUX_NAME=$(find_artifact_name "*AppImage.tar.gz" | grep -v '.sig$' | head -n 1)

          # Escape notes for JSON (replace newlines, quotes, backslashes)
          NOTES_ESCAPED=$(echo "$NOTES" | python3 -c 'import json,sys; print(json.dumps(sys.stdin.read()))')

          # Build latest.json
          cat > latest.json << MANIFEST
          {
            "version": "${VERSION}",
            "notes": ${NOTES_ESCAPED},
            "pub_date": "${PUB_DATE}",
            "platforms": {
          MANIFEST

          FIRST=true

          add_platform() {
            local key="$1" sig="$2" name="$3"
            if [ -n "$sig" ] && [ -n "$name" ]; then
              if [ "$FIRST" = true ]; then
                FIRST=false
              else
                echo "," >> latest.json
              fi
              cat >> latest.json << ENTRY
              "${key}": {
                "signature": "${sig}",
                "url": "${BASE_URL}/${name}"
              }
          ENTRY
            fi
          }

          add_platform "darwin-aarch64" "$MACOS_ARM_SIG" "$MACOS_ARM_NAME"
          add_platform "darwin-x86_64" "$MACOS_X64_SIG" "$MACOS_X64_NAME"
          add_platform "windows-x86_64" "$WIN_NSIS_SIG" "$WIN_NSIS_NAME"
          add_platform "linux-x86_64" "$LINUX_SIG" "$LINUX_NAME"

          cat >> latest.json << 'FOOTER'
            }
          }
          FOOTER

          # Pretty-print and validate
          python3 -m json.tool latest.json > latest_formatted.json && mv latest_formatted.json latest.json

          echo "Generated latest.json:"
          cat latest.json

      - name: Upload latest.json to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          # Also upload updater artifacts (.tar.gz, .zip, .sig) that were in prereleased
          # They should already be on the release from the build step, but upload latest.json
          gh release upload "$TAG" latest.json \
            --repo "${{ github.repository }}" \
            --clobber

  # Update Homebrew Cask when release is published
  update-homebrew:
    if: github.event.action == 'released'
    runs-on: ubuntu-latest
    steps:
      - name: Download macOS DMGs and compute SHA256
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"

          # Download aarch64 DMG
          DMG_ARM="TiyCode_${VERSION}_aarch64.dmg"
          gh release download "$GITHUB_REF_NAME" \
            --repo "${{ github.repository }}" \
            --pattern "$DMG_ARM" \
            --dir .

          # Download x64 DMG
          DMG_X64="TiyCode_${VERSION}_x64.dmg"
          gh release download "$GITHUB_REF_NAME" \
            --repo "${{ github.repository }}" \
            --pattern "$DMG_X64" \
            --dir .

          # Compute SHA256
          SHA256_ARM64=$(sha256sum "$DMG_ARM" | awk '{print $1}')
          SHA256_X64=$(sha256sum "$DMG_X64" | awk '{print $1}')

          echo "SHA256_ARM64=$SHA256_ARM64" >> "$GITHUB_ENV"
          echo "SHA256_X64=$SHA256_X64" >> "$GITHUB_ENV"

          echo "aarch64 sha256: $SHA256_ARM64"
          echo "x64 sha256: $SHA256_X64"

      - name: Generate Cask file
        run: |
          cat > tiycode.rb << 'CASK'
          cask "tiycode" do
            version "__VERSION__"

            on_arm do
              url "https://github.com/TiyAgents/tiycode/releases/download/v#{version}/TiyCode_#{version}_aarch64.dmg"
              sha256 "__SHA256_ARM64__"
            end

            on_intel do
              url "https://github.com/TiyAgents/tiycode/releases/download/v#{version}/TiyCode_#{version}_x64.dmg"
              sha256 "__SHA256_X64__"
            end

            name "TiyCode"
            desc "Open-source, flexible, convenient cross-platform vibe-coding agent"
            homepage "https://tiy.ai"

            livecheck do
              url :url
              strategy :github_latest
            end

            auto_updates true
            depends_on macos: ">= :catalina"

            app "TiyCode.app"

            zap trash: [
              "~/Library/Application Support/ai.tiy.tiycode",
              "~/Library/Caches/ai.tiy.tiycode",
              "~/Library/Preferences/ai.tiy.tiycode.plist",
              "~/Library/Saved Application State/ai.tiy.tiycode.savedState",
            ]
          end
          CASK

          sed -i \
            -e "s/__VERSION__/$VERSION/" \
            -e "s/__SHA256_ARM64__/$SHA256_ARM64/" \
            -e "s/__SHA256_X64__/$SHA256_X64/" \
            tiycode.rb

          echo "Generated Cask:"
          cat tiycode.rb

      - name: Push to Homebrew tap
        uses: dmnemec/copy_file_to_another_repo_action@main
        env:
          API_TOKEN_GITHUB: ${{ secrets.PAT_TOKEN }}
        with:
          source_file: tiycode.rb
          destination_repo: TiyAgents/homebrew-tap
          destination_folder: Casks
          destination_branch: master
          user_email: github-actions[bot]@users.noreply.github.com
          user_name: github-actions[bot]
          commit_message: "Update TiyCode to ${{ env.VERSION }}"
