name: Build and Upload Release Assets

on:
  release:
    types: [prereleased, released]

permissions:
  contents: write

jobs:
  build:
    if: github.event.action == 'prereleased'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: macos
            arch: aarch64
            target: aarch64-apple-darwin
          - os: macos-13
            platform: macos
            arch: x86_64
            target: x86_64-apple-darwin
          - os: windows-latest
            platform: windows
            arch: x86_64
            target: x86_64-pc-windows-msvc
          - os: ubuntu-22.04
            platform: linux
            arch: x86_64
            target: x86_64-unknown-linux-gnu

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Linux dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libgtk-3-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev

      - name: Install ripgrep
        shell: bash
        run: |
          if [ "${{ matrix.platform }}" = "linux" ]; then
            sudo apt-get install -y ripgrep
          elif [ "${{ matrix.platform }}" = "macos" ]; then
            brew install ripgrep
          else
            choco install ripgrep -y
          fi

      - name: Install dependencies
        run: npm ci

      - name: Set version from tag
        shell: bash
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          # Update tauri.conf.json version
          node -e "
            const fs = require('fs');
            const conf = JSON.parse(fs.readFileSync('src-tauri/tauri.conf.json', 'utf8'));
            conf.version = '$VERSION';
            fs.writeFileSync('src-tauri/tauri.conf.json', JSON.stringify(conf, null, 2) + '\n');
          "
          # Update Cargo.toml version
          sed -i.bak "s/^version = \".*\"/version = \"$VERSION\"/" src-tauri/Cargo.toml
          rm -f src-tauri/Cargo.toml.bak
          echo "Set version to $VERSION"

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Only sign, do NOT notarize via tauri-action (we submit async below)
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          tauriScript: npx tauri
          args: --target ${{ matrix.target }}

      - name: Submit notarization (async)
        if: matrix.platform == 'macos'
        continue-on-error: true
        run: |
          BUNDLE_DIR="src-tauri/target/${{ matrix.target }}/release/bundle"
          for dmg in "$BUNDLE_DIR"/dmg/*.dmg; do
            [ -f "$dmg" ] || continue
            echo "Submitting $dmg for notarization..."
            xcrun notarytool submit "$dmg" \
              --apple-id "$APPLE_ID" \
              --password "$APPLE_APP_SPECIFIC_PASSWORD" \
              --team-id "$APPLE_TEAM_ID"
          done
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: Collect release artifacts
        shell: bash
        run: |
          mkdir -p release-artifacts
          BUNDLE_DIR="src-tauri/target/${{ matrix.target }}/release/bundle"

          if [ "${{ matrix.platform }}" = "macos" ]; then
            cp "$BUNDLE_DIR"/dmg/*.dmg release-artifacts/ 2>/dev/null || true
          elif [ "${{ matrix.platform }}" = "windows" ]; then
            cp "$BUNDLE_DIR"/msi/*.msi release-artifacts/ 2>/dev/null || true
            cp "$BUNDLE_DIR"/nsis/*.exe release-artifacts/ 2>/dev/null || true
          elif [ "${{ matrix.platform }}" = "linux" ]; then
            cp "$BUNDLE_DIR"/deb/*.deb release-artifacts/ 2>/dev/null || true
            cp "$BUNDLE_DIR"/rpm/*.rpm release-artifacts/ 2>/dev/null || true
            cp "$BUNDLE_DIR"/appimage/*.AppImage release-artifacts/ 2>/dev/null || true
          fi

          echo "Collected artifacts:"
          ls -la release-artifacts/

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: release-artifacts/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Save artifacts for later use
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.platform }}-${{ matrix.arch }}
          path: release-artifacts/*
          retention-days: 30

  # Publish stable release: upload update manifests when promoted from prerelease
  publish-stable:
    if: github.event.action == 'released'
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts from prereleased workflow run
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          echo "Looking for prereleased workflow run for tag: $TAG"

          RUN_ID=$(gh run list \
            --repo "${{ github.repository }}" \
            --workflow "release.yml" \
            --json databaseId,conclusion,headBranch \
            --jq ".[] | select(.headBranch == \"$TAG\" and .conclusion == \"success\") | .databaseId" \
            | head -n 1)

          if [ -z "$RUN_ID" ]; then
            echo "::warning::No successful prereleased workflow run found for tag $TAG. Skipping manifest upload."
            exit 0
          fi

          echo "Found workflow run: $RUN_ID"

          gh run download "$RUN_ID" \
            --repo "${{ github.repository }}" \
            --pattern "release-*" \
            --dir artifacts

          echo "Downloaded artifacts:"
          find artifacts -type f | sort
